var state = {
    mode: 'all', questions: [], currentIndex: 0,
    selectedOptions: [], answered: false,
    correctCount: 0, wrongCount: 0,
    answeredQuestions: [],
    wrongIds: JSON.parse(localStorage.getItem('jihu_wrong_ids')||'[]'),
    shuffled: false
};

function isMulti(q){ return Array.isArray(q.answer); }

document.addEventListener('DOMContentLoaded', function(){ updateWrongUI(); switchMode('all'); });

function updateWrongUI(){
    var cnt = state.wrongIds.length;
    var badge = document.getElementById('wrongCountBadge');
    badge.textContent = cnt>0 ? '('+cnt+')' : '';
    var bar = document.getElementById('wrongBar');
    if(cnt>0){ bar.style.display='flex'; document.getElementById('wrongBarNum').textContent=cnt; }
    else { bar.style.display='none'; }
}

function switchMode(mode){
    state.mode = mode; state.currentIndex=0; state.correctCount=0; state.wrongCount=0;
    state.answeredQuestions=[]; state.answered=false; state.selectedOptions=[]; state.shuffled=false;
    document.querySelectorAll('.mode-btn').forEach(function(b){ b.classList.remove('active'); });
    document.querySelector('[data-mode="'+mode+'"]').classList.add('active');
    if(mode==='all'){ state.questions=ALL_QUESTIONS.slice(); }
    else if(mode==='random'){ state.questions=shuffleArr(ALL_QUESTIONS.slice()); state.shuffled=true; }
    else if(mode==='wrong'){
        var wids=state.wrongIds;
        state.questions=ALL_QUESTIONS.filter(function(q){ return wids.indexOf(q.id)!==-1; });
        if(state.questions.length===0){
            document.getElementById('cardArea').innerHTML='<div class="result-card"><div class="result-icon">🎉</div><div style="font-size:20px;font-weight:600;margin-bottom:8px;">没有错题！</div><div style="color:#718096;margin-bottom:16px;">所有题目都已掌握，继续保持！</div><button class="btn btn-primary" onclick="switchMode(\'all\')">开始全部刷题</button></div>';
            document.getElementById('progressWrap').style.display='none';
            return;
        }
    }
    document.getElementById('progressWrap').style.display='block';
    updateProgress();
    renderQuestion();
}

function shuffleArr(arr){ for(var i=arr.length-1;i>0;i--){ var j=Math.floor(Math.random()*(i+1)); var t=arr[i];arr[i]=arr[j];arr[j]=t; } return arr; }

function renderQuestion(){
    if(state.currentIndex>=state.questions.length){ showResult(); return; }
    var q=state.questions[state.currentIndex];
    state.answered=false; state.selectedOptions=[];
    var multi = isMulti(q);
    var opts=q.options;
    if(state.shuffled){ opts=shuffleArr(opts.slice()); }
    var h='<div class="question-card">';
    h+='<span class="question-type'+(multi?' multi':'')+'">'+(multi?'多选题':'单选题')+'</span>';
    h+='<div class="question-num">第 '+(state.currentIndex+1)+'/'+state.questions.length+' 题 · 题号 #'+q.id+'</div>';
    h+='<div class="question-text">'+esc(q.question)+'</div>';
    if(multi){ h+='<div style="color:#e67e22;font-size:13px;margin-bottom:12px;">（可多选，选择后点击"确认答案"）</div>'; }
    h+='<div class="options" id="optionsContainer">';
    opts.forEach(function(opt){
        var labelClass = multi ? 'label square' : 'label';
        var onclick = multi ? ('toggleMulti(''+opt.label+'',this)') : ('selectSingle(''+opt.label+'',this)');
        h+='<div class="option" data-label="'+opt.label+'" onclick="'+onclick+'"><span class="'+labelClass+'">'+opt.label+'</span><span class="text">'+esc(opt.text)+'</span></div>';
    });
    h+='</div>';
    h+='<div class="explanation" id="explanation"></div>';
    h+='<div class="btn-row">';
    if(multi){
        h+='<button class="btn btn-primary" id="confirmBtn" onclick="confirmMulti()">确认答案</button>';
    }
    h+='<button class="btn btn-primary" id="nextBtn" style="display:none" onclick="nextQuestion()">'+(state.currentIndex<state.questions.length-1?'下一题 →':'查看结果')+'</button>';
    h+='</div>';
    h+='</div>';
    document.getElementById('cardArea').innerHTML=h;
    window.scrollTo({top:0,behavior:'smooth'});
}

function toggleMulti(label,el){
    if(state.answered)return;
    var idx=state.selectedOptions.indexOf(label);
    if(idx>=0){
        state.selectedOptions.splice(idx,1);
        el.classList.remove('selected');
    } else {
        state.selectedOptions.push(label);
        el.classList.add('selected');
    }
}

function confirmMulti(){
    if(state.answered || state.selectedOptions.length===0)return;
    state.answered=true;
    var q=state.questions[state.currentIndex];
    var correctAnswer=q.answer;
    var selected=state.selectedOptions.slice().sort();
    var correct=correctAnswer.slice().sort();
    var isCorrect=arraysEqual(selected,correct);

    var allOpts=document.querySelectorAll('.option');
    allOpts.forEach(function(opt){
        opt.classList.add('disabled');
        var ol=opt.getAttribute('data-label');
        if(correctAnswer.indexOf(ol)>=0){ opt.classList.add('correct'); }
        if(selected.indexOf(ol)>=0 && correctAnswer.indexOf(ol)<0){ opt.classList.add('wrong'); }
    });

    document.getElementById('confirmBtn').style.display='none';
    document.getElementById('nextBtn').style.display='block';

    var expEl=document.getElementById('explanation');
    if(isCorrect){
        expEl.className='explanation correct-exp show';
        expEl.innerHTML='✅ <strong>回答正确！</strong> 正确答案：'+correctAnswer.join('、');
        state.correctCount++;
    } else {
        expEl.className='explanation wrong-exp show';
        expEl.innerHTML='❌ <strong>回答错误</strong> · 正确答案是 <strong>'+correctAnswer.join('、')+'</strong>（你选了：'+selected.join('、')+'）';
        state.wrongCount++;
        if(state.wrongIds.indexOf(q.id)===-1){
            state.wrongIds.push(q.id);
            localStorage.setItem('jihu_wrong_ids',JSON.stringify(state.wrongIds));
            updateWrongUI();
        }
    }
    state.answeredQuestions.push({id:q.id,correct:isCorrect});
    updateProgress();
}

function selectSingle(label,el){
    if(state.answered)return;
    state.selectedOptions=[label]; state.answered=true;
    var q=state.questions[state.currentIndex];
    var correctAnswer=q.answer;
    var isCorrect=(label===correctAnswer);
    el.classList.add('selected');
    var allOpts=document.querySelectorAll('.option');
    allOpts.forEach(function(opt){
        opt.classList.add('disabled');
        var ol=opt.getAttribute('data-label');
        if(ol===correctAnswer){ opt.classList.add('correct'); }
        if(ol===label&&!isCorrect){ opt.classList.add('wrong'); }
    });
    var expEl=document.getElementById('explanation');
    if(isCorrect){
        expEl.className='explanation correct-exp show';
        expEl.innerHTML='✅ <strong>回答正确！</strong>';
        state.correctCount++;
    } else {
        expEl.className='explanation wrong-exp show';
        expEl.innerHTML='❌ <strong>回答错误</strong> · 正确答案是 <strong>'+correctAnswer+'</strong>';
        state.wrongCount++;
        if(state.wrongIds.indexOf(q.id)===-1){
            state.wrongIds.push(q.id);
            localStorage.setItem('jihu_wrong_ids',JSON.stringify(state.wrongIds));
            updateWrongUI();
        }
    }
    state.answeredQuestions.push({id:q.id,correct:isCorrect});
    document.getElementById('nextBtn').style.display='block';
    updateProgress();
}

function arraysEqual(a,b){
    if(a.length!==b.length)return false;
    for(var i=0;i<a.length;i++){ if(a[i]!==b[i])return false; }
    return true;
}

function nextQuestion(){ state.currentIndex++; updateProgress(); renderQuestion(); }

function updateProgress(){
    var total=state.questions.length;
    var done=state.currentIndex;
    var pct=total>0?Math.round(done/total*100):0;
    document.getElementById('progressText').textContent='第 '+Math.min(done+1,total)+'/'+total+' 题';
    document.getElementById('correctNum').textContent=state.correctCount;
    document.getElementById('wrongNum').textContent=state.wrongCount;
    document.getElementById('progressFill').style.width=pct+'%';
}

function showResult(){
    var total=state.answeredQuestions.length;
    var correct=state.correctCount;
    var wrong=state.wrongCount;
    var pct=total>0?Math.round(correct/total*100):0;
    var emoji,msg;
    if(pct>=90){ emoji='🏆'; msg='太厉害了！知识掌握非常扎实！'; }
    else if(pct>=70){ emoji='👍'; msg='表现不错，继续加油！'; }
    else if(pct>=50){ emoji='📖'; msg='还需努力，多复习几遍！'; }
    else { emoji='💪'; msg='别灰心，坚持练习就会进步！'; }
    document.getElementById('progressWrap').style.display='none';
    var h='<div class="result-card">';
    h+='<div class="result-icon">'+emoji+'</div>';
    h+='<div class="result-score">'+pct+'分</div>';
    h+='<div class="result-label">'+msg+'</div>';
    h+='<div class="result-stats"><div class="stat-item"><div class="stat-num" style="color:#38a169">'+correct+'</div><div class="stat-label">答对</div></div><div class="stat-item"><div class="stat-num" style="color:#e53e3e">'+wrong+'</div><div class="stat-label">答错</div></div><div class="stat-item"><div class="stat-num" style="color:#718096">'+total+'</div><div class="stat-label">总题数</div></div></div>';
    if(wrong>0){ h+='<button class="btn btn-danger" style="width:100%;margin-bottom:10px" onclick="switchMode(\'wrong\')">🔁 错题重练 ('+state.wrongIds.length+'题)</button>'; }
    h+='<div style="display:flex;gap:10px"><button class="btn btn-primary" onclick="switchMode(\'all\')">📝 再来一遍</button><button class="btn btn-outline" onclick="switchMode(\'random\')">🎲 随机刷题</button></div>';
    h+='</div>';
    document.getElementById('cardArea').innerHTML=h;
}

function sharePage(){
    if(navigator.share){ navigator.share({title:'基础护理学 · 刷题练习',text:'一起来刷基础护理学选择题，备战护考！',url:window.location.href}).catch(function(){}); }
    else if(/MicroMessenger/i.test(navigator.userAgent)){ showToast('请点击右上角 ··· 分享给朋友'); }
    else { copyLink(); }
}

function copyLink(){
    var url=window.location.href;
    if(navigator.clipboard){ navigator.clipboard.writeText(url).then(function(){ showToast('链接已复制，去微信粘贴给朋友吧！'); }).catch(function(){ showToast('复制失败，请手动复制地址栏链接'); }); }
    else {
        var ta=document.createElement('textarea'); ta.value=url;
        ta.style.cssText='position:fixed;opacity:0;';
        document.body.appendChild(ta); ta.select();
        try{ document.execCommand('copy'); showToast('链接已复制，去微信粘贴给朋友吧！'); }catch(e){ showToast('复制失败，请手动复制地址栏链接'); }
        document.body.removeChild(ta);
    }
}

function showToast(msg){
    var old=document.querySelector('.toast'); if(old)old.remove();
    var t=document.createElement('div'); t.className='toast'; t.textContent=msg;
    document.getElementById('toastContainer').appendChild(t);
    setTimeout(function(){ t.remove(); },2000);
}

function esc(text){
    var d=document.createElement('div'); d.textContent=text; return d.innerHTML;
}
</script>
